name: tinyPLAYER
options:
  bundleIdPrefix: com.tinyplayer
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  tinyPLAYER:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: tinyPLAYER
        excludes:
          - "**/*.entitlements"
    resources:
      - path: tinyPLAYER/Model/tinyPLAYER.xcdatamodeld
    info:
      path: tinyPLAYER/Info.plist
      properties:
        NSAppleMusicUsageDescription: "tinyPLAYER needs Apple Music access to play your library."
        NSAppleEventsUsageDescription: "tinyPLAYER uses Apple Events to control Music.app in the background."
    entitlements:
      path: tinyPLAYER/tinyPLAYER.entitlements
      properties:
        com.apple.developer.musickit: true
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinyplayer.tinyPLAYER
        INFOPLIST_FILE: tinyPLAYER/Info.plist
        CODE_SIGN_ENTITLEMENTS: tinyPLAYER/tinyPLAYER.entitlements
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

  tinyPLAYERTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: tinyPLAYERTests
    dependencies:
      - target: tinyPLAYER
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinyplayer.tinyPLAYERTests
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
